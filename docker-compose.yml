services:
  calendario-emocional:
    build:
      context: .
      dockerfile: Dockerfile
    image: calendario-emocional:latest
    container_name: calendario-emocional
    ports:
      - '${APP_BIND_ADDRESS:-0.0.0.0}:${APP_PORT:-4321}:4321'
    expose:
      - '4321'
    environment:
      NODE_ENV: production
      HOST: '0.0.0.0'
      PORT: '4321'
      DATABASE_PATH: /app/data/emotional-calendar.sqlite
      PUBLIC_CLERK_PUBLISHABLE_KEY: ${PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-emotional-calendar}
      MONGODB_COLLECTION_PREFIX: ${MONGODB_COLLECTION_PREFIX:-emotional_calendar}
      DISABLE_AUTO_MONGO_SYNC: ${DISABLE_AUTO_MONGO_SYNC:-0}
    volumes:
      - calendario_emocional_data:/app/data
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4321/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - default
      - npm_default

  mongo:
    image: mongo:8
    container_name: calendario-emocional-mongo
    expose:
      - '27017'
    volumes:
      - calendario_emocional_mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - default

volumes:
  calendario_emocional_data:
  calendario_emocional_mongo:

networks:
  default:
  npm_default:
    external: true
