services:
  calendario-emocional:
    build:
      context: .
      dockerfile: Dockerfile
    image: calendario-emocional:latest
    container_name: calendario-emocional
    ports:
      - '${APP_BIND_ADDRESS:-0.0.0.0}:${APP_PORT:-4321}:4321'
    expose:
      - '4321'
    environment:
      NODE_ENV: production
      HOST: '0.0.0.0'
      PORT: '4321'
      DATABASE_PATH: /app/data/emotional-calendar.sqlite
      PUBLIC_CLERK_PUBLISHABLE_KEY: ${PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-emotional-calendar}
      MONGODB_COLLECTION_PREFIX: ${MONGODB_COLLECTION_PREFIX:-emotional_calendar}
      DISABLE_AUTO_MONGO_SYNC: ${DISABLE_AUTO_MONGO_SYNC:-0}
    volumes:
      - calendario_emocional_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4321/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - default
      - npm_default

  mongo-keepalive:
    image: mongo:8
    container_name: calendario-emocional-mongo-keepalive
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-emotional-calendar}
      MONGODB_KEEPALIVE_INTERVAL_SECONDS: ${MONGODB_KEEPALIVE_INTERVAL_SECONDS:-86400}
    command:
      - /bin/sh
      - -c
      - |
          interval="$${MONGODB_KEEPALIVE_INTERVAL_SECONDS:-86400}"
          while true; do
            date -u +"[%Y-%m-%dT%H:%M:%SZ] MongoDB keepalive ping"
            mongosh "$${MONGODB_URI}" --quiet --eval "db.getSiblingDB('$${MONGODB_DB_NAME}').runCommand({ ping: 1 })" || true
            sleep "$${interval}"
          done
    restart: unless-stopped
    networks:
      - default

volumes:
  calendario_emocional_data:

networks:
  default:
  npm_default:
    external: true
